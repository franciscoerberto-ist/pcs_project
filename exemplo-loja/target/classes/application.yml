server:
  port: 8080

spring:
  application:
    name: exemplo-loja
  datasource:
    url: jdbc:h2:mem:lojademo
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
